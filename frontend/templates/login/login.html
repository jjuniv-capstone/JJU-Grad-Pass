<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 전주대학교 맞춤형 서비스</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #E4F5FF;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            text-align: center;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .title h1 {
            color: #0487D3;
            font-weight: 900;
            font-size: 2rem;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .title p {
            color: #666;
            margin-bottom: 30px;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .tab.active {
            background-color: #0487D3;
            color: white;
        }

        .tab.inactive {
            background-color: white;
            color: #0487D3;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fcfcfc;
            box-sizing: border-box; /* 패딩으로 인해 박스가 튀어나가는 것 방지 */
        }

        .options {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 25px;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background-color: #1a83bf;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .signup-link {
            font-size: 0.8rem;
            color: #888;
        }

        .signup-link a {
            color: #0487D3;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="title">
        <h1>전주대학교 맞춤형<br>졸업 요건 체크 서비스</h1>
        <p>서비스 사용을 위해 로그인해 주세요</p>
    </div>

    <div class="login-box">
        <div class="tabs">
            <a href="login.html" class="tab active">로그인</a>
            <a href="signup.html" class="tab inactive">회원가입</a>
        </div>

        <div class="input-group">
            <label for="student-id">학번</label>
            <input type="text" id="student-id" placeholder="학번을 입력하세요">
        </div>
        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요">
        </div>

        <div class="options">
            <label><input type="checkbox"> 로그인 유지</label>
            <div>학번 찾기 | 비밀번호 찾기</div>
        </div>

        <button type="submit" class="login-btn">LOGIN</button>

        <p class="signup-link">
            계정이 없으신가요? <a href="#">회원가입</a>
        </p>
    </div>
</div>

</body>
</html>
