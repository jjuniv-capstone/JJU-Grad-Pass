<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJU Grad-Pass - 시간표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f7ff; font-family: 'Pretendard', sans-serif; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }

        /* 시간표 테이블 */
        .timetable-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .timetable-table th {
            background-color: #3b82f6;
            color: white;
            padding: 10px 6px;
            text-align: center;
            font-weight: 600;
        }
        .timetable-table th:first-child {
            width: 100px;
        }
        .timetable-table td {
            border: 1px solid #e5e7eb;
            padding: 8px 6px;
            text-align: center;
            vertical-align: middle;
            height: 48px;
        }
        .timetable-table tr:nth-child(even) td:first-child {
            background-color: #f9fafb;
        }
        .timetable-table tr:nth-child(odd) td:first-child {
            background-color: #f3f4f6;
        }
        .period-cell {
            font-weight: 600;
            color: #374151;
            font-size: 0.75rem;
            background-color: #f3f4f6 !important;
            white-space: nowrap;
        }
        .subject-cell {
            border-radius: 6px;
            font-weight: 500;
            line-height: 1.3;
            cursor: default;
        }
        .subject-cell .subject-name {
            font-weight: 700;
            font-size: 0.8rem;
            display: block;
        }
        .subject-cell .subject-room {
            font-size: 0.7rem;
            opacity: 0.8;
            display: block;
            margin-top: 2px;
        }

        /* 파스텔 배경색 */
        .pastel-0 { background-color: #dbeafe; color: #1e40af; }
        .pastel-1 { background-color: #fce7f3; color: #9d174d; }
        .pastel-2 { background-color: #d1fae5; color: #065f46; }
        .pastel-3 { background-color: #fef3c7; color: #92400e; }
        .pastel-4 { background-color: #e0e7ff; color: #3730a3; }
        .pastel-5 { background-color: #ffe4e6; color: #9f1239; }
        .pastel-6 { background-color: #ccfbf1; color: #134e4a; }
        .pastel-7 { background-color: #fde68a; color: #78350f; }
        .pastel-8 { background-color: #e9d5ff; color: #6b21a8; }
        .pastel-9 { background-color: #fed7aa; color: #9a3412; }
    </style>
    <link rel="stylesheet" href="../../static/css/navbar.css">
</head>
<body class="p-4 md:p-8">
    <nav class="navbar">
        <div class="nav-logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>JJU Grad-Pass</span>
        </div>
        <div class="nav-menu">
            <a href="/home" class="nav-item"><i class="fa-solid fa-house"></i> 홈</a>
            <a href="/dashboard" class="nav-item"><i class="fa-solid fa-table-cells-large"></i> 대시보드</a>
            <a href="/recommend" class="nav-item"><i class="fa-solid fa-book-open"></i> 과목추천</a>
            <a href="/score" class="nav-item"><i class="fa-solid fa-graduation-cap"></i> 성적관리</a>
            <a href="/timetable" class="nav-item active"><i class="fa-solid fa-calendar-days"></i> 시간표</a>
            <a href="/board" class="nav-item"><i class="fa-solid fa-comment-dots"></i> 게시판</a>
            <a href="/" class="nav-item logout"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</a>
        </div>
    </nav>

    <main style="padding-top: 50px;">
    <div class="max-w-4xl mx-auto">
        <!-- 로딩 -->
        <div id="loading" class="card p-12 text-center mb-6">
            <i class="fa-solid fa-spinner fa-spin text-blue-500 text-3xl mb-4"></i>
            <p class="text-gray-500">시간표를 불러오는 중...</p>
        </div>

        <!-- 데이터 없음 안내 -->
        <div id="no-data" class="card p-12 text-center mb-6 hidden">
            <i class="fa-solid fa-calendar-xmark text-gray-300 text-5xl mb-4"></i>
            <p class="text-gray-500 text-lg font-semibold">시간표 데이터가 없습니다</p>
            <p class="text-gray-400 text-sm mt-2">인스타에서 수강 정보를 먼저 불러와 주세요.</p>
        </div>

        <!-- 시간표 컨텐츠 -->
        <div id="timetable-content" class="hidden">
            <!-- 시간표 격자 -->
            <section class="card p-6 mb-6">
                <h2 class="text-blue-600 font-bold mb-4 flex items-center text-lg">
                    <i class="fa-solid fa-calendar-days mr-2"></i> 시간표
                </h2>
                <div class="overflow-x-auto">
                    <table class="timetable-table" id="timetable-grid">
                        <!-- JS로 렌더링 -->
                    </table>
                </div>
            </section>

            <!-- 기타 수강 과목 -->
            <section id="online-section" class="card p-6 mb-6 hidden">
                <h2 class="text-blue-600 font-bold mb-4 flex items-center text-lg">
                    <i class="fa-solid fa-list mr-2"></i> 기타 수강 과목
                </h2>
                <div id="online-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                    <!-- JS로 렌더링 -->
                </div>
            </section>
        </div>
    </div><!-- max-w-4xl -->
    </main>

    <script>
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const loadingEl = document.getElementById('loading');
            const noDataEl = document.getElementById('no-data');
            const contentEl = document.getElementById('timetable-content');

            try {
                const res = await fetch('/api/instar/result');
                if (!res.ok) throw new Error('API 오류');
                const json = await res.json();
                if (!json.success || !json.data) throw new Error('데이터 없음');
                const timetable = json.data.timetable;

                if (!timetable || !timetable.grid || timetable.grid.length === 0) {
                    loadingEl.classList.add('hidden');
                    noDataEl.classList.remove('hidden');
                    return;
                }

                renderTimetable(timetable);
                loadingEl.classList.add('hidden');
                contentEl.classList.remove('hidden');
            } catch (e) {
                console.error(e);
                loadingEl.classList.add('hidden');
                noDataEl.classList.remove('hidden');
            }
        });

        function renderTimetable(timetable) {
            const { grid, subjects } = timetable;

            // 과목명 -> 색상 매핑
            const colorMap = {};
            let colorIndex = 0;
            function getColor(subjectName) {
                if (!colorMap[subjectName]) {
                    colorMap[subjectName] = 'pastel-' + (colorIndex % 10);
                    colorIndex++;
                }
                return colorMap[subjectName];
            }

            // 요일 키
            const dayKeys = ['mon', 'tue', 'wed', 'thu', 'fri'];
            const dayLabels = ['월', '화', '수', '목', '금'];

            // 토요일 데이터 있는지 확인
            const hasSat = grid.some(row => row.sat && row.sat.trim() !== '');
            if (hasSat) {
                dayKeys.push('sat');
                dayLabels.push('토');
            }

            // 일반 교시와 온라인 교시 분리 (71, 72 등 높은 번호는 온라인)
            const normalRows = [];
            const onlineRows = [];
            grid.forEach(row => {
                const periodNum = parseInt(row.period);
                if (periodNum >= 70) {
                    onlineRows.push(row);
                } else {
                    normalRows.push(row);
                }
            });

            // --- 시간표 격자 렌더링 ---
            const table = document.getElementById('timetable-grid');

            // 셀 내용 파싱: "과목명(강의실)" -> { name, room }
            function parseCell(text) {
                if (!text || text.trim() === '') return null;
                const match = text.match(/^(.+?)\((.+)\)$/);
                if (match) {
                    return { name: match[1].trim(), room: match[2].trim() };
                }
                return { name: text.trim(), room: '' };
            }

            // 각 요일별 셀 데이터 구성 (rowspan 계산)
            // cellMap[dayIdx][rowIdx] = { info, rowspan } 또는 'skip'
            const cellMap = [];
            for (let d = 0; d < dayKeys.length; d++) {
                const dayKey = dayKeys[d];
                const col = [];
                for (let r = 0; r < normalRows.length; r++) {
                    const info = parseCell(normalRows[r][dayKey]);
                    if (!info) {
                        col.push({ info: null, rowspan: 1 });
                    } else {
                        // 이전 셀과 같은 과목이면 병합
                        if (r > 0 && col[r - 1] !== 'skip') {
                            const prev = col[r - 1];
                            if (prev.info && prev.info.name === info.name && prev.info.room === info.room) {
                                prev.rowspan++;
                                col.push('skip');
                                continue;
                            }
                        } else if (r > 0 && col[r - 1] === 'skip') {
                            // 이전이 skip이면 원본 찾기
                            let origin = r - 1;
                            while (origin >= 0 && col[origin] === 'skip') origin--;
                            if (origin >= 0) {
                                const prev = col[origin];
                                if (prev.info && prev.info.name === info.name && prev.info.room === info.room) {
                                    prev.rowspan++;
                                    col.push('skip');
                                    continue;
                                }
                            }
                        }
                        col.push({ info, rowspan: 1 });
                    }
                }
                cellMap.push(col);
            }

            // 헤더
            let headerHtml = '<thead><tr><th>교시</th>';
            dayLabels.forEach(label => {
                headerHtml += `<th>${label}</th>`;
            });
            headerHtml += '</tr></thead>';

            // 바디
            let bodyHtml = '<tbody>';
            for (let r = 0; r < normalRows.length; r++) {
                const row = normalRows[r];
                const timeLabel = row.time || '';
                bodyHtml += '<tr>';
                bodyHtml += `<td class="period-cell">${escapeHtml(row.period)}교시<br><span style="font-size:0.65rem;color:#6b7280;">${escapeHtml(timeLabel)}</span></td>`;

                for (let d = 0; d < dayKeys.length; d++) {
                    const cell = cellMap[d][r];
                    if (cell === 'skip') continue;
                    if (!cell.info) {
                        bodyHtml += `<td${cell.rowspan > 1 ? ` rowspan="${cell.rowspan}"` : ''}></td>`;
                    } else {
                        const cls = getColor(cell.info.name);
                        bodyHtml += `<td rowspan="${cell.rowspan}" class="subject-cell ${cls}">`;
                        bodyHtml += `<span class="subject-name">${escapeHtml(cell.info.name)}</span>`;
                        if (cell.info.room) {
                            bodyHtml += `<span class="subject-room">${escapeHtml(cell.info.room)}</span>`;
                        }
                        bodyHtml += '</td>';
                    }
                }
                bodyHtml += '</tr>';
            }
            bodyHtml += '</tbody>';

            table.innerHTML = headerHtml + bodyHtml;

            // --- 온라인 강의 섹션 ---
            const onlineSection = document.getElementById('online-section');
            const onlineList = document.getElementById('online-list');

            // ds_list2 과목을 기타 수강 과목으로 표시
            if (subjects && subjects.length > 0) {
                onlineSection.classList.remove('hidden');
                onlineList.innerHTML = subjects.map(sub => {
                    const cls = getColor(sub.name);
                    return `
                        <div class="flex items-start gap-3 p-4 rounded-lg border border-gray-100 bg-gray-50">
                            <div class="w-2 rounded-full h-full min-h-[40px] ${cls}" style="min-width:8px;"></div>
                            <div>
                                <p class="font-bold text-gray-800 text-sm">${escapeHtml(sub.name)}</p>
                                <p class="text-xs text-gray-400 mt-1">
                                    <span class="mr-3"><i class="fa-solid fa-hashtag mr-1"></i>${escapeHtml(sub.code)}</span>
                                    <span class="mr-3"><i class="fa-solid fa-users mr-1"></i>${escapeHtml(sub.bunban)}분반</span>
                                    <span><i class="fa-solid fa-chalkboard-user mr-1"></i>${escapeHtml(sub.professor)}</span>
                                </p>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }
    </script>
</body>
</html>
