<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과목 추천 서비스</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0487D3;
            --border-color: #e1e1e1;
            --text-gray: #777;
            --tag-red: #ff4d4d;
            --tag-orange: #ffa500;
            --tag-blue: #007bff;
        }

        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fbff; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }

        /* 검색 및 필터 영역 */
        .search-container {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .search-box, .filter-box {
            position: relative;
            margin-bottom: 15px;
        }
        .search-box input, .filter-box select {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            font-size: 0.95rem;
            outline: none;
        }
        .search-box i, .filter-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        /* 과목 카드 리스트 */
        .course-list { display: flex; flex-direction: column; gap: 15px; }
        .course-card {
            background: #fff;
            border: 2px solid #d1e9ff;
            border-radius: 15px;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: transform 0.2s;
        }
        .course-card:hover { transform: translateY(-3px); }

        .course-info h3 { font-size: 1.3rem; margin-bottom: 5px; color: #333; }
        .course-details { color: var(--text-gray); font-size: 0.9rem; margin-bottom: 10px; }
        .course-details span { margin-right: 15px; }

        .tags { display: flex; gap: 10px; align-items: center; }
        .tag { font-size: 0.8rem; font-weight: 700; }
        .tag.essential { color: var(--tag-red); }
        .tag.recommend { color: var(--tag-orange); }
        .tag.select { color: var(--tag-blue); }
        .tag.type { color: #aaa; font-weight: 400; }

        .recommend-reason { color: var(--tag-blue); font-size: 0.9rem; font-weight: 500; }

        /* 로딩 애니메이션 */
        .loading { text-align: center; padding: 40px; color: var(--primary-blue); font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="과목명 또는 과목코드 검색">
        </div>
        <div class="filter-box">
            <i class="fa-solid fa-chevron-down"></i>
            <select id="categoryFilter">
                <option value="">전체 카테고리</option>
                <option value="전공필수">전공 필수</option>
                <option value="전공선택">전공 선택</option>
            </select>
        </div>
    </div>

    <div id="courseList" class="course-list">
        <div class="loading">데이터를 불러오는 중입니다...</div>
    </div>
</div>

<script>
    let allCourses = []; // 전체 데이터를 저장할 변수

    async function fetchCourses() {
        try {
            // 실제 API 대신 모의 데이터 호출
            allCourses = await simulateApiCall();
            applyFilters(); // 데이터 로드 후 초기 필터 적용
        } catch (error) {
            document.getElementById('courseList').innerHTML = '<div class="loading">데이터를 불러오지 못했습니다.</div>';
        }
    }

    // 필터링 조건을 확인하고 리스트를 다시 그리는 함수
    function applyFilters() {
        const filterValue = document.getElementById('categoryFilter').value;
        const searchValue = document.getElementById('searchInput').value.toLowerCase();

        const filtered = allCourses.filter(course => {
            // 카테고리 필터링 (전공필수/전공선택)
            const matchesCategory = filterValue === "" || course.type === filterValue;
            // 검색어 필터링 (과목명)
            const matchesSearch = course.name.toLowerCase().includes(searchValue);

            return matchesCategory && matchesSearch;
        });

        renderCourses(filtered);
    }

    // 과목 카드를 화면에 그리는 함수
    function renderCourses(courses) {
        const listContainer = document.getElementById('courseList');
        listContainer.innerHTML = '';

        if (courses.length === 0) {
            listContainer.innerHTML = '<div class="loading">해당하는 과목이 없습니다.</div>';
            return;
        }

        courses.forEach(course => {
            const card = document.createElement('div');
            card.className = 'course-card';

            let statusClass = 'select';
            if(course.status === '필수') statusClass = 'essential';
            if(course.status === '권장') statusClass = 'recommend';

            card.innerHTML = `
                <div class="course-main">
                    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 8px;">
                        <h3>${course.name}</h3>
                        <div class="tags">
                            <span class="tag ${statusClass}">${course.status}</span>
                            <span class="tag type">${course.type}</span>
                        </div>
                    </div>
                    <div class="course-details">
                        <span>${course.credit}학점</span>
                        <span>교수: ${course.professor}</span>
                        <span>개설학기: ${course.semester}</span>
                    </div>
                </div>
                <div class="recommend-reason">
                    추천 이유 : ${course.reason}
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    // 모의 API 데이터
    function simulateApiCall() {
        return new Promise((resolve) => {
            setTimeout(() => {
                resolve([
                    { name: "데이터베이스", credit: 3, professor: "김교수", semester: "1학기", type: "전공필수", status: "필수", reason: "전공 필수 미이수" },
                    { name: "운영체제", credit: 3, professor: "김교수", semester: "1학기", type: "전공필수", status: "필수", reason: "전공 필수 미이수" },
                    { name: "인공지능", credit: 3, professor: "김교수", semester: "1학기", type: "전공선택", status: "권장", reason: "전공 선택 학점 부족" },
                    { name: "소프트웨어공학", credit: 3, professor: "김교수", semester: "1학기", type: "전공선택", status: "선택", reason: "전공 필수 미이수" }
                ]);
            }, 800);
        });
    }

    // 이벤트 리스너 등록
    document.getElementById('categoryFilter').addEventListener('change', applyFilters);
    document.getElementById('searchInput').addEventListener('input', applyFilters);

    // 초기 실행
    fetchCourses();
</script>
</body>
</html>
