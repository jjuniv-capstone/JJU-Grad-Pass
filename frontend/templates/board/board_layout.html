{% extends "layout.html" %}

{% block title %}게시판 - JJU Grad-Pass{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/board.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}

{% block content %}
<!-- ========== 게시판 공통 레이아웃 ========== -->

<!-- 공통 상단 네비게이션 바 -->
<nav class="navbar">
  <div class="nav-logo">
    <i class="fa-solid fa-graduation-cap"></i>
    <span>JJU Grad-Pass</span>
  </div>
  <div class="nav-menu">
    <a href="/home" class="nav-item"><i class="fa-solid fa-house"></i> 홈</a>
    <a href="/dashboard" class="nav-item"><i class="fa-solid fa-table-cells-large"></i> 대시보드</a>
    <a href="/recommend" class="nav-item"><i class="fa-solid fa-book-open"></i> 과목추천</a>
    <a href="/score" class="nav-item"><i class="fa-solid fa-graduation-cap"></i> 성적관리</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-calendar-days"></i> 시간표</a>
    <a href="/board" class="nav-item active"><i class="fa-solid fa-comment-dots"></i> 게시판</a>
    <a href="/" class="nav-item logout"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</a>
  </div>
</nav>

<!-- 탭 필터 (게시판 카테고리) -->
<div class="board-tabs-wrap">
  <div class="board-tabs">
    <a href="/board/course" class="board-tabs__item {% block tab_course_active %}{% endblock %}">강의평가</a>
    <a href="/board/community" class="board-tabs__item {% block tab_anonymous_active %}{% endblock %}">익명</a>
    <a href="/board/community?cat=returning" class="board-tabs__item {% block tab_returning_active %}{% endblock %}">복학생</a>
    <a href="/board/community?cat=minor" class="board-tabs__item {% block tab_minor_active %}{% endblock %}">부전공</a>
    <a href="/board/community?cat=double" class="board-tabs__item {% block tab_double_active %}{% endblock %}">복수전공</a>
  </div>
</div>

<!-- 본문 영역 -->
<main class="board-main">
  {% block board_content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='js/board.js') }}"></script>
{% block board_scripts %}{% endblock %}
{% endblock %}
