<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과목 추천 서비스</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0487D3;
            --border-color: #e1e1e1;
            --text-gray: #777;
            --tag-red: #ff4d4d;
            --tag-orange: #ffa500;
            --tag-blue: #007bff;
        }

        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fbff; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }

        .page-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .page-header h1 {
            font-size: 1.8rem;
            color: var(--primary-blue);
            margin-bottom: 5px;
        }
        .page-header p {
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        .search-container {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .search-box, .filter-box {
            position: relative;
            margin-bottom: 15px;
        }
        .filter-box:last-child { margin-bottom: 0; }
        .search-box input, .filter-box select {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
        }
        .search-box i, .filter-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        .summary-box {
            background: #e8f4fd;
            border: 1px solid #b8ddf0;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #333;
            line-height: 1.8;
        }
        .summary-box strong { color: var(--primary-blue); }

        .course-list { display: flex; flex-direction: column; gap: 15px; }
        .course-card {
            background: #fff;
            border: 2px solid #d1e9ff;
            border-radius: 15px;
            padding: 20px 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: transform 0.2s;
        }
        .course-card:hover { transform: translateY(-3px); }

        .course-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .course-top h3 { font-size: 1.2rem; color: #333; margin: 0; }
        .tags { display: flex; gap: 8px; align-items: center; }
        .tag {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
        }
        .tag.essential { background: #fff0f0; color: var(--tag-red); }
        .tag.recommend { background: #fff8e6; color: var(--tag-orange); }
        .tag.select { background: #e8f0fe; color: var(--tag-blue); }
        .tag.category { background: #f0f0f0; color: #666; }

        .course-details { color: var(--text-gray); font-size: 0.85rem; }
        .course-details span { margin-right: 15px; }
        .recommend-reason {
            margin-top: 8px;
            color: var(--tag-blue);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .loading { text-align: center; padding: 40px; color: var(--primary-blue); font-weight: 700; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .course-top { flex-direction: column; align-items: flex-start; }
        }
    </style>
    <link rel="stylesheet" href="../../static/css/navbar.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-logo">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>JJU Grad-Pass</span>
    </div>

    <!-- 상단바 -->
    <div class="nav-menu">
        <a href="/home" class="nav-item"><i class="fa-solid fa-house"></i> 홈</a>
        <a href="/dashboard" class="nav-item"><i class="fa-solid fa-table-cells-large"></i> 대시보드</a>
        <a href="/recommend" class="nav-item active"><i class="fa-solid fa-book-open"></i> 과목추천</a>
        <a href="/score" class="nav-item"><i class="fa-solid fa-graduation-cap"></i> 성적관리</a>
        <a href="/timetable" class="nav-item"><i class="fa-solid fa-calendar-days"></i> 시간표</a>
        <a href="/board" class="nav-item"><i class="fa-solid fa-comment-dots"></i> 게시판</a>
        <a href="/" class="nav-item logout"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</a>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1>졸업요건 기반 과목 추천</h1>
        <p>미충족 졸업요건에 해당하는 이번 학기 개설강좌를 추천합니다</p>
    </div>

    <div id="summaryBox" class="summary-box" hidden></div>

    <!-- 졸업 로드맵 -->
    <div id="roadmapSection" hidden>
        <h2 style="font-size:1.3rem;color:var(--primary-blue);margin-bottom:15px;"><i class="fa-solid fa-route"></i> 졸업 로드맵</h2>
        <div id="roadmapInfo" style="background:#fff;border:2px solid #d1e9ff;border-radius:15px;padding:15px 20px;margin-bottom:15px;font-size:0.85rem;color:#555;"></div>
        <div id="roadmapCards" style="display:flex;gap:15px;overflow-x:auto;padding-bottom:10px;margin-bottom:25px;"></div>
        <div id="roadmapWarning" style="background:#fff0f0;border:1px solid #ffcccc;border-radius:12px;padding:12px 18px;margin-bottom:20px;color:#cc0000;font-size:0.85rem;font-weight:700;display:none;"></div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="과목명 또는 학수번호 검색">
        </div>
        <div class="filter-box">
            <i class="fa-solid fa-filter"></i>
            <select id="categoryFilter">
                <option value="">전체 이수구분</option>
            </select>
        </div>
    </div>

    <div id="courseList" class="course-list">
        <div class="loading">데이터를 불러오는 중입니다...</div>
    </div>

    <a href="/" class="back-link">홈으로 돌아가기</a>
</div>

<script>
function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let allCourses = [];
let takenCodes = new Set();
let unfulfilledCategories = new Set();

async function fetchData() {
    try {
        const resp = await fetch("/api/instar/result");
        const result = await resp.json();

        if (!result.success) {
            document.getElementById('courseList').innerHTML =
                '<div class="loading">학적정보가 없습니다. <a href="/">홈에서 학적정보 연동</a>을 먼저 해주세요.</div>';
            return;
        }

        const { courses, grades, requirements } = result.data;

        // 이미 수강한 과목코드
        if (grades) {
            for (const g of grades) {
                if (g.code) takenCodes.add(g.code);
            }
        }

        // 미충족 이수구분
        const unfulfilledDetails = [];
        if (requirements) {
            for (const req of requirements) {
                if (req.passed !== "Y") {
                    unfulfilledCategories.add(req.category);
                    const standard = parseInt(req.standard) || 0;
                    const result_val = parseInt(req.result) || 0;
                    const shortage = standard - result_val;
                    unfulfilledDetails.push(`${req.item_name} ${shortage}${req.unit} 부족`);
                }
            }
        }

        // 개설강좌 → 추천 과목 변환
        if (courses) {
            for (const c of courses) {
                const isTaken = takenCodes.has(c.code);
                const isUnfulfilled = unfulfilledCategories.has(c.category);

                let status = "선택";
                let reason = "";

                if (isTaken) continue; // 이미 수강한 과목 제외

                if (isUnfulfilled) {
                    status = "필수";
                    reason = `${c.category} 미충족`;
                } else {
                    status = "선택";
                    reason = "추가 이수 가능";
                }

                allCourses.push({
                    code: c.code + (c.bunban ? "-" + c.bunban : ""),
                    name: c.subject,
                    credit: c.credits,
                    professor: c.professor,
                    schedule: c.schedule || "",
                    category: c.category,
                    enrolled: c.enrolled,
                    capacity: c.capacity,
                    status: status,
                    reason: reason,
                });
            }
        }

        // 필수를 먼저 보여줌
        allCourses.sort((a, b) => {
            if (a.status === "필수" && b.status !== "필수") return -1;
            if (a.status !== "필수" && b.status === "필수") return 1;
            return 0;
        });

        // 카테고리 필터 동적 생성
        const categories = [...new Set(allCourses.map(c => c.category))].sort();
        const filterEl = document.getElementById('categoryFilter');
        for (const cat of categories) {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            filterEl.appendChild(opt);
        }

        // 요약 표시
        const essentialCount = allCourses.filter(c => c.status === "필수").length;
        const summaryBox = document.getElementById('summaryBox');
        summaryBox.innerHTML = `
            <strong>수강 완료:</strong> ${takenCodes.size}과목 |
            <strong>추천 과목:</strong> ${essentialCount}개 (필수)<br>
            <strong>미충족 항목:</strong> ${unfulfilledDetails.length > 0 ? unfulfilledDetails.map(d => escapeHtml(d)).join(', ') : "없음 (졸업요건 충족!)"}
        `;
        summaryBox.hidden = false;

        // 졸업 로드맵 생성
        buildRoadmap(result.data);

        applyFilters();
    } catch (error) {
        document.getElementById('courseList').innerHTML =
            '<div class="loading">데이터를 불러오지 못했습니다.</div>';
    }
}

function applyFilters() {
    const filterValue = document.getElementById('categoryFilter').value;
    const searchValue = document.getElementById('searchInput').value.toLowerCase();

    const filtered = allCourses.filter(course => {
        const matchesCategory = filterValue === "" || course.category === filterValue;
        const matchesSearch = course.name.toLowerCase().includes(searchValue)
            || course.code.toLowerCase().includes(searchValue);
        return matchesCategory && matchesSearch;
    });

    renderCourses(filtered);
}

function renderCourses(courses) {
    const listContainer = document.getElementById('courseList');
    listContainer.innerHTML = '';

    if (courses.length === 0) {
        listContainer.innerHTML = '<div class="loading">해당하는 과목이 없습니다.</div>';
        return;
    }

    courses.forEach(course => {
        const card = document.createElement('div');
        card.className = 'course-card';

        let statusClass = 'select';
        if (course.status === '필수') statusClass = 'essential';

        card.innerHTML = `
            <div class="course-top">
                <h3>${escapeHtml(course.name)}</h3>
                <div class="tags">
                    <span class="tag ${statusClass}">${escapeHtml(course.status)}</span>
                    <span class="tag category">${escapeHtml(course.category)}</span>
                </div>
            </div>
            <div class="course-details">
                <span>${escapeHtml(course.code)}</span>
                <span>${escapeHtml(course.credit)}학점</span>
                <span>${escapeHtml(course.professor)}</span>
                <span>${escapeHtml(course.schedule)}</span>
                <span>${escapeHtml(course.enrolled)}/${escapeHtml(course.capacity)}명</span>
            </div>
            <div class="recommend-reason">
                추천 이유: ${escapeHtml(course.reason)}
            </div>
        `;
        listContainer.appendChild(card);
    });
}

document.getElementById('categoryFilter').addEventListener('change', applyFilters);
document.getElementById('searchInput').addEventListener('input', applyFilters);

function buildRoadmap(data) {
    const { member, graduation, requirements, grades } = data;
    const section = document.getElementById('roadmapSection');
    const infoEl = document.getElementById('roadmapInfo');
    const cardsEl = document.getElementById('roadmapCards');
    const warningEl = document.getElementById('roadmapWarning');

    if (!graduation || !requirements) return;

    // 1. 직전학기 평점 계산 → 최대학점 결정
    let lastGpa = 0;
    let maxCredits = 18;
    if (grades && grades.length > 0) {
        // 가장 최근 학기 찾기
        let lastYear = 0, lastSem = 0;
        grades.forEach(g => {
            const y = parseInt(g.year) || 0;
            const s = parseInt(g.semester) || 0;
            if (y > lastYear || (y === lastYear && s > lastSem)) {
                lastYear = y;
                lastSem = s;
            }
        });
        // 직전학기 성적 평균 (P/F 제외)
        let totalPts = 0, totalCr = 0;
        grades.filter(g => parseInt(g.year) === lastYear && parseInt(g.semester) === lastSem).forEach(g => {
            const cr = parseFloat(g.credits) || 0;
            const gpa = parseFloat(g.gpa) || 0;
            if (gpa > 0 && cr > 0) { totalPts += gpa * cr; totalCr += cr; }
        });
        lastGpa = totalCr > 0 ? totalPts / totalCr : 0;

        if (lastGpa < 1.5) maxCredits = 15;
        else if (lastGpa < 3.0) maxCredits = 18;
        else maxCredits = 19;
    }

    // 2. 남은 학기 계산
    const hakjYear = parseInt(member.HAKJ_YEAR) || 1;
    const now = new Date();
    const curMonth = now.getMonth() + 1;
    const isSecond = curMonth >= 8;
    const currentSemNum = (hakjYear - 1) * 2 + (isSecond ? 2 : 1);
    const remainingSem = Math.max(0, 8 - currentSemNum);

    // 3. 학점 계산
    const hakjumSum = parseInt(graduation.hakjum_sum) || 0;
    const hakjumGrad = parseInt(graduation.hakjum_grad) || 0;
    const sugangSum = parseInt(graduation.sugang_sum) || 0;
    const totalEarned = hakjumSum + sugangSum;
    const totalNeeded = Math.max(0, hakjumGrad - totalEarned);

    // 4. 미충족 항목 추출 + 우선순위 정렬
    const priorityOrder = ['전필', '전선', '기초', '심화', '진로지도', '채플', '기독교', '인성', '의사소통', '외국어', '소프트웨어', '인간과삶', '사회와경제', '과학과생명', '문화와예술', '학문융합', '사회봉사', '자유'];
    const unfulfilled = [];
    let hasThesis = false;

    requirements.forEach(req => {
        if (req.passed === 'Y') return;
        const std = parseInt(req.standard) || 0;
        const res = parseInt(req.result) || 0;
        const shortage = std - res;
        if (shortage <= 0 && req.unit === '학점') return;

        if (req.item_name === '논문') {
            hasThesis = true;
            return;
        }

        const priority = priorityOrder.indexOf(req.item_name);
        unfulfilled.push({
            name: req.item_name,
            category: req.category,
            shortage: shortage,
            unit: req.unit,
            priority: priority >= 0 ? priority : 99,
        });
    });

    unfulfilled.sort((a, b) => a.priority - b.priority);

    // 5. 자유선택 학점 계산
    const freeNeeded = Math.max(0, totalNeeded - unfulfilled.reduce((s, u) => s + (u.unit === '학점' ? u.shortage : 0), 0));
    if (freeNeeded > 0) {
        unfulfilled.push({ name: '자유선택', category: '기타', shortage: freeNeeded, unit: '학점', priority: 98 });
    }

    // 6. 졸업 충족 여부 먼저 체크
    section.hidden = false;
    infoEl.innerHTML = `<strong>직전학기 평점:</strong> ${lastGpa.toFixed(2)} | <strong>학기당 최대:</strong> ${maxCredits}학점 | <strong>남은 학기:</strong> ${remainingSem}학기 | <strong>남은 학점:</strong> ${totalNeeded}학점`;

    if (unfulfilled.length === 0 && !hasThesis && totalNeeded <= 0) {
        cardsEl.innerHTML = '<div style="background:#d4edda;border:2px solid #28a745;border-radius:15px;padding:30px;text-align:center;width:100%;"><span style="font-size:2rem;">&#127891;</span><p style="font-size:1.1rem;font-weight:700;color:#28a745;margin:10px 0 0;">졸업요건을 모두 충족했습니다!</p></div>';
        return;
    }

    if (remainingSem <= 0) {
        warningEl.style.display = 'block';
        warningEl.textContent = '남은 학기가 없습니다. 초과학기 또는 계절학기를 고려하세요.';
        return;
    }

    // 7. 미충족 항목 복사 (배분용)
    const items = unfulfilled.map(u => ({ ...u }));
    const semesters = [];

    for (let i = 0; i < remainingSem; i++) {
        let remaining = maxCredits;
        const semLabel = getSemesterLabel(hakjYear, isSecond, i + 1);
        const semItems = [];

        for (const item of items) {
            if (item.unit !== '학점' || item.shortage <= 0) continue;
            let assign = 0;
            if (item.name === '사회봉사') {
                assign = Math.min(item.shortage, 1);
            } else {
                assign = Math.min(item.shortage, remaining);
                if (assign >= 3) assign = Math.floor(assign / 3) * 3;
            }
            if (assign > remaining) assign = remaining;
            if (assign <= 0) continue;

            item.shortage -= assign;
            remaining -= assign;
            semItems.push({ name: item.name, category: item.category, credits: assign });

            if (remaining <= 0) break;
        }

        // 횟수 단위 항목 (채플 횟수 등)
        for (const item of items) {
            if (item.unit === '학점' || item.shortage <= 0) continue;
            if (item.name === '논문') continue; // 논문은 별도 처리
            const assign = Math.min(item.shortage, 2);
            item.shortage -= assign;
            semItems.push({ name: item.name, category: item.category, credits: assign + item.unit });
        }

        // 마지막 학기에 논문 배치
        if (i === remainingSem - 1 && hasThesis) {
            semItems.push({ name: '논문', category: '전공', credits: '이수' });
        }

        const totalCredits = semItems.reduce((s, si) => s + (typeof si.credits === 'number' ? si.credits : 0), 0);
        semesters.push({ label: semLabel, items: semItems, total: totalCredits });
    }

    // 8. 렌더링 + 경고 체크
    if (totalNeeded > remainingSem * maxCredits) {
        warningEl.style.display = 'block';
        warningEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> 남은 학기(${remainingSem}) × 최대학점(${maxCredits}) = ${remainingSem * maxCredits}학점으로 부족학점(${totalNeeded})을 채울 수 없습니다. 계절학기 또는 초과학기를 고려하세요.`;
    }

    const colorMap = { '전공': '#dbeafe', '교양': '#d1fae5', '기타': '#fef3c7' };
    const textColorMap = { '전공': '#1e40af', '교양': '#065f46', '기타': '#92400e' };

    cardsEl.innerHTML = semesters.map((sem, idx) => {
        const isLast = idx === semesters.length - 1;
        const itemsHtml = sem.items.length > 0
            ? sem.items.map(si => {
                const bg = colorMap[si.category] || '#f0f0f0';
                const tc = textColorMap[si.category] || '#333';
                const creditLabel = typeof si.credits === 'number' ? si.credits + '학점' : si.credits;
                return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:${bg};border-radius:8px;margin-bottom:4px;font-size:0.8rem;color:${tc};font-weight:600;"><span>${escapeHtml(si.name)}</span><span>${escapeHtml(creditLabel)}</span></div>`;
            }).join('')
            : '<p style="color:#aaa;font-size:0.8rem;text-align:center;">추가 이수 없음</p>';

        return `
            <div style="min-width:200px;max-width:220px;background:#fff;border:2px solid ${isLast ? '#28a745' : '#d1e9ff'};border-radius:15px;padding:18px;flex-shrink:0;">
                <div style="text-align:center;margin-bottom:12px;">
                    <span style="font-size:0.75rem;font-weight:700;color:#fff;background:${isLast ? '#28a745' : 'var(--primary-blue)'};padding:3px 12px;border-radius:20px;">${escapeHtml(sem.label)}</span>
                </div>
                ${itemsHtml}
                <div style="border-top:1px solid #eee;margin-top:10px;padding-top:8px;text-align:center;font-size:0.85rem;font-weight:700;color:#333;">
                    합계 ${sem.total}학점 ${isLast ? '→ 졸업' : ''}
                </div>
            </div>
        `;
    }).join('<div style="display:flex;align-items:center;font-size:1.5rem;color:#ccc;flex-shrink:0;">→</div>');
}

function getSemesterLabel(curYear, isSecond, offset) {
    let year = curYear;
    let sem = isSecond ? 2 : 1;
    for (let i = 0; i < offset; i++) {
        sem++;
        if (sem > 2) { sem = 1; year++; }
    }
    if (year > 4) {
        const extra = (year - 4) * 2 + sem - 2;
        return '초과 ' + extra + '학기';
    }
    return year + '학년 ' + sem + '학기';
}

fetchData();
</script>
</body>
</html>
