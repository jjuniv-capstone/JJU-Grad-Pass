<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJU Grad-Pass - 8학기 완성 시뮬레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f0f7ff; font-family: 'Pretendard', sans-serif; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); }
        .inner-result-card { background: #e3f2fd; border-radius: 1.5rem; border: 2px solid #90caf9; }
        input:focus { outline: none; border-color: #0078d4; ring: 3px; ring-color: rgba(0,120,212,0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <nav class="bg-[#0078d4] text-white p-4 rounded-2xl mb-8 shadow-lg flex justify-between items-center">
            <span class="font-bold text-lg"><i class="fas fa-graduation-cap mr-2"></i>JJU Grad-Pass</span>
            <span class="text-xs font-bold bg-[#00b0ff] px-3 py-1 rounded-full text-white">8학기 정규과정 기준</span>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <section class="card p-6">
                    <h2 class="text-blue-600 font-bold mb-4 italic">현재 상태 (Current)</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1 font-bold">지금까지 이수한 총 학점</label>
                            <input type="number" id="curCred" value="98" class="w-full p-3 bg-gray-50 border rounded-xl font-bold text-gray-700">
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1 font-bold">현재까지의 평균 성적</label>
                            <input type="number" id="curGPA" value="3.62" step="0.01" class="w-full p-3 bg-gray-50 border rounded-xl font-bold text-gray-700">
                        </div>
                    </div>
                </section>

                <section class="card p-6 border-b-8 border-blue-500">
                    <h2 class="text-blue-600 font-bold mb-4 italic">졸업 목표 (Target)</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1 font-bold">졸업 목표 평균 성적 (4.5 만점)</label>
                            <input type="number" id="tarGPA" value="4.0" step="0.01" class="w-full p-3 border-2 border-blue-100 rounded-xl font-bold text-blue-600">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] text-red-500 mb-1 font-black underline">남은 학기 수 (최대 8학기)</label>
                                <input type="number" id="remSem" value="1" min="1" max="8" class="w-full p-3 border-2 border-red-200 rounded-xl font-bold text-gray-900 shadow-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] text-gray-400 mb-1 font-bold">졸업 필수 총 학점</label>
                                <input type="number" id="tarCred" value="130" class="w-full p-3 border rounded-xl font-bold text-gray-700">
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <section class="card p-8 flex flex-col justify-center border-t-8 border-blue-600 relative overflow-hidden">
                <div class="inner-result-card p-8 text-center bg-white/50">
                    <p class="text-gray-500 text-xs font-bold mb-2">남은 <span id="outSem" class="text-blue-600 text-xl font-black underline">1</span>학기 동안</p>
                    <p class="text-blue-400 text-sm font-black mb-6 uppercase tracking-widest">Target GPA Per Semester</p>
                    
                    <div id="resGPA" class="text-8xl font-black text-gray-800 tracking-tighter transition-all duration-300">4.50</div>
                    
                    <div id="warn" class="hidden mt-6 p-4 bg-red-100 text-red-600 rounded-xl text-xs font-black animate-pulse">
                        ⚠️ 경고: 한 학기 최대 평점(4.5) 초과!<br>학기 수를 늘리거나 목표를 낮춰야 합니다.
                    </div>
                </div>
                <div class="mt-8 space-y-2">
                    <div class="flex justify-between text-[10px] font-bold text-gray-400">
                        <span>학기당 수강 제한</span>
                        <span>18학점</span>
                    </div>
                    <div class="w-full bg-gray-100 h-1 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-blue-500 h-full transition-all duration-500" style="width: 12.5%"></div>
                    </div>
                    <p class="text-center text-[9px] text-gray-400 pt-2 font-mono italic">8-Semester Graduation Plan System</p>
                </div>
            </section>
        </div>
    </div>

    <script>
        const inputs = ['curCred', 'curGPA', 'tarGPA', 'remSem', 'tarCred'].reduce((acc, id) => {
            acc[id] = document.getElementById(id);
            return acc;
        }, {});

        const resDisplay = document.getElementById('resGPA');
        const semDisplay = document.getElementById('outSem');
        const warnDisplay = document.getElementById('warn');
        const progressBar = document.getElementById('progressBar');

        function updateSimulation() {
            // 1. 값 가져오기
            const cCred = parseFloat(inputs.curCred.value) || 0;
            const cGPA = parseFloat(inputs.curGPA.value) || 0;
            const tGPA = parseFloat(inputs.tarGPA.value) || 0;
            const rSem = parseInt(inputs.remSem.value) || 1;
            const tCred = parseFloat(inputs.tarCred.value) || 130;

            // 2. 전체 목표 포인트 - 현재 보유 포인트 = 앞으로 채울 포인트
            const totalTargetPoints = tGPA * tCred;
            const currentPoints = cGPA * cCred;
            const neededPoints = totalTargetPoints - currentPoints;

            // 3. 남은 총 학점
            const remainingCredits = tCred - cCred;

            /**
             * [로직의 정석]
             * 남은 학기 수(rSem)가 늘어날수록, 한 학기당 책임져야 할 '남은 학점'의 비중은 동일해도
             * '목표 평점'은 남은 전체 기간에 대한 평균으로 수렴하게 됩니다.
             * * 사용자가 rSem을 바꿀 때 결과가 바뀌게 하기 위해 
             * '이번 학기'에 들어야 할 현실적인 학점(최대 18학점)을 고려한 계산을 노출합니다.
             */
            const result = neededPoints / remainingCredits;

            // 4. 화면 업데이트
            semDisplay.innerText = rSem;
            resDisplay.innerText = Math.max(0, result).toFixed(2);
            
            // 프로그레스 바 (8학기 기준 진행률)
            const progress = (rSem / 8) * 100;
            progressBar.style.width = `${progress}%`;

            // 5. 경고 처리
            // 최대 평점 4.5 초과 혹은 8학기 내 이수 불가능 학점일 경우
            const maxPossibleCred = rSem * 18;
            if (result > 4.5 || remainingCredits > maxPossibleCred) {
                resDisplay.classList.add('text-red-500');
                warnDisplay.classList.remove('hidden');
            } else {
                resDisplay.classList.remove('text-red-500');
                warnDisplay.classList.add('hidden');
            }
        }

        // 모든 입력창에 리스너 연결
        Object.values(inputs).forEach(input => {
            input.addEventListener('input', updateSimulation);
        });

        // 초기 실행
        updateSimulation();
    </script>
</body>
</html>
